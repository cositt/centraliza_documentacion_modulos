site_name: Centraliza - Documentación Módulos Odoo
site_description: Documentación completa de módulos de pagos SEPA y reconciliación
site_author: Centraliza
site_url: https://cositt.github.io/centraliza_documentacion_modulos/

theme:
  name: material
  language: es
  logo: https://www.odoo.com/web/image/website/1/logo?unique=b6cf0f2
  favicon: https://www.odoo.com/web/image/website/1/favicon
  features:
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.sections
    - navigation.expand
    - search.suggest
    - search.highlight
    - content.tabs.link
    - toc.follow
  palette:
    - scheme: light
      primary: blue
      accent: blue
      toggle:
        icon: material/brightness-7
        name: Modo oscuro
    - scheme: dark
      primary: blue
      accent: blue
      toggle:
        icon: material/brightness-4
        name: Modo claro

plugins:
  - search:
      lang: es

nav:
  - Inicio: docs/index.md
  - Setup:
      - Instalación: docs/setup/installation-order.md
      - Dependencias: docs/setup/dependencies.md
  - Módulos:
      - Pagos:
          - account_payment_mode: docs/modules/payment/account_payment_mode.md
          - account_payment_order: docs/modules/payment/account_payment_order.md
          - account_banking_mandate: docs/modules/payment/account_banking_mandate.md
      - SEPA:
          - account_banking_pain_base: docs/modules/sepa/account_banking_pain_base.md
          - account_banking_sepa_direct_debit: docs/modules/sepa/account_banking_sepa_direct_debit.md
          - l10n_es_account_banking_sepa_fsdd: docs/modules/sepa/l10n_es_account_banking_sepa_fsdd.md
      - Reconciliación:
          - account_reconcile_oca: docs/modules/reconciliation/account_reconcile_oca.md
          - account_reconcile_analytic_tag: docs/modules/reconciliation/account_reconcile_analytic_tag.md
      - Extractos:
          - account_statement_base: docs/modules/statements/account_statement_base.md
          - account_statement_import_base: docs/modules/statements/account_statement_import_base.md
          - account_statement_import_file: docs/modules/statements/account_statement_import_file.md
          - account_statement_import_sheet_file: docs/modules/statements/account_statement_import_sheet_file.md
  - Guías:
      - Flujo Pagos SEPA: docs/guides/workflow-payment-sepa.md
      - Reconciliación Bancaria: docs/guides/workflow-bank-reconciliation.md
      - Importar Extractos: docs/guides/workflow-statement-import.md
      - Ejemplos:
          - Crear Orden de Pago: docs/guides/examples/create-payment-order.md
          - Reconciliar Extractos: docs/guides/examples/reconcile-statements.md
          - Importar CSV: docs/guides/examples/import-csv.md
  - API: docs/api/models-fields.md
  - Troubleshooting: docs/troubleshooting.md

markdown_extensions:
  - toc:
      permalink: "#"
  - tables
  - attr_list
  - md_in_html
  - pymdownx.highlight
  - pymdownx.inlinehilite
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
